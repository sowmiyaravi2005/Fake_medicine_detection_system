{% extends 'base.html' %}
{% block title %}Admin Login · Fake Medicine Detection{% endblock %}
{% block content %}
<div class="auth-wrapper d-flex justify-content-center">
  <div class="card form-card shadow-lg border-0 w-100" style="max-width: 480px;">
    <div class="card-body">
      <p class="text-uppercase text-primary small mb-2">Licensed access</p>
      <h2 class="h4 mb-3">Admin Login</h2>
      <form method="post" class="row g-3">
        <div class="col-12 form-floating">
          <input type="text" name="username" class="form-control" id="admin-username" placeholder="Username" required>
          <label for="admin-username">Username</label>
        </div>
        <div class="col-12 form-floating">
          <input type="password" name="password" class="form-control" id="admin-password" placeholder="Password" required>
          <label for="admin-password">Password</label>
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary w-100">Login</button>
        </div>
      </form>
      <p class="small text-muted text-center mt-3">New admin? <a href="{{ url_for('admin_register') }}">Register here</a>.</p>
    </div>
  </div>
</div>
{% endblock %}
