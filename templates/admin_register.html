{% extends 'base.html' %}
{% block title %}Admin Register · Fake Medicine Detection{% endblock %}
{% block content %}
<div class="auth-wrapper d-flex justify-content-center">
  <div class="card form-card shadow-lg border-0 w-100" style="max-width: 480px;">
    <div class="card-body">
      <p class="text-uppercase text-primary small mb-2">Government licensed only</p>
      <h2 class="h4 mb-3">Create admin account</h2>
      <form method="post" class="row g-3">
        <div class="col-12 form-floating">
          <input type="text" name="username" class="form-control" id="new-admin" placeholder="Username" required>
          <label for="new-admin">Username</label>
        </div>
        <div class="col-12 form-floating">
          <input type="password" name="password" class="form-control" id="new-password" placeholder="Password" required>
          <label for="new-password">Password</label>
        </div>
        <div class="col-12 form-floating">
          <input type="text" name="license_number" class="form-control" id="license-number" placeholder="License number" required>
          <label for="license-number">License Number</label>
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary w-100">Register</button>
        </div>
      </form>
      <p class="small text-muted text-center mt-3">Already registered? <a href="{{ url_for('admin_login') }}">Login</a>.</p>
    </div>
  </div>
</div>
{% endblock %}
